[pytest]
asyncio_mode = auto
python_files = test_*.py
markers =
    security: اختبارات تتعلق بالتحقق الأمني.
    architecture: اختبارات تتعلق بالحوكمة المعمارية.
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore:.*relationship .* conflicts .*:sqlalchemy.exc.SAWarning
    ignore:The 'validate_default' attribute with value True was provided:pydantic.warnings.UnsupportedFieldAttributeWarning
