name: 🧪 Comprehensive Testing

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: comprehensive-testing-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: '3.12'
  DATABASE_URL: "sqlite+aiosqlite:///:memory:"
  SECRET_KEY: "test-secret-key-for-ci"
  ENVIRONMENT: "testing"
  LLM_MOCK_MODE: '1'
  SUPABASE_URL: "https://dummy.supabase.co"
  SUPABASE_SERVICE_ROLE_KEY: "dummy-key-for-ci"
  RECOVERY_ADMIN_PASSWORD: "dummy-pass-for-ci"

jobs:
  quality-gate:
    name: Enterprise Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 45

    strategy:
      fail-fast: false
      matrix:
        suite:
          - name: unit
            path: tests
            marker: 'not fuzz and not security'
            extra_args: '--cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --junit-xml=unit-junit.xml'
          - name: property
            path: tests/property_based
            marker: ''
            extra_args: '--hypothesis-show-statistics --hypothesis-seed=0 --junit-xml=property-junit.xml'
          - name: fuzzing
            path: tests/fuzzing
            marker: 'fuzz'
            extra_args: '--timeout=300 --junit-xml=fuzzing-junit.xml'
          - name: integration
            path: tests/integration
            marker: ''
            extra_args: '--junit-xml=integration-junit.xml'
          - name: security
            path: tests/security
            marker: 'security'
            extra_args: '--junit-xml=security-junit.xml'

    steps:
      - name: Fetch repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Set up deterministic environment
        uses: ./.github/actions/setup

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
          exit 0

      - name: Execute ${{ matrix.suite.name }} suite
        shell: bash
        run: |
          set -euo pipefail
          if [ ! -d "${{ matrix.suite.path }}" ]; then
            echo "ℹ️ Directory ${{ matrix.suite.path }} not found. Skipping suite=${{ matrix.suite.name }}."
            exit 0
          fi

          MARKER_ARGS=""
          if [ -n "${{ matrix.suite.marker }}" ]; then
            MARKER_ARGS="-m \"${{ matrix.suite.marker }}\""
          fi

          # shellcheck disable=SC2086
          eval "python -m pytest ${{ matrix.suite.path }} -v ${MARKER_ARGS} ${{ matrix.suite.extra_args }}"
          exit 0

      - name: Upload suite artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-artifacts-${{ matrix.suite.name }}
          path: |
            *-junit.xml
            coverage.xml
          if-no-files-found: ignore
          retention-days: 14

  final-verification:
    name: ✅ Final Verification
    runs-on: ubuntu-latest
    needs: [quality-gate]
    if: always() && !cancelled()

    steps:
      - name: Evaluate matrix outcome
        shell: bash
        run: |
          set -euo pipefail
          echo "quality-gate=${{ needs.quality-gate.result }}"
          if [ "${{ needs.quality-gate.result }}" != "success" ]; then
            echo "❌ Comprehensive quality gate failed"
            exit 1
          fi
          echo "✅ Comprehensive quality gate passed"
          exit 0
