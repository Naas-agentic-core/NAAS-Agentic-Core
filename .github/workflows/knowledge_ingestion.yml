name: Knowledge Ingestion

on:
  push:
    branches: [main, master]
    paths:
      - 'knowledge_base/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: knowledge-ingestion-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  ingest:
    name: Ingest Changed Knowledge Assets
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install system dependencies (OCR)
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr libtesseract-dev

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pypdf python-docx openpyxl pandas pillow pytesseract httpx

      - name: Get changed files
        id: changed-files
        uses: tj-actions/changed-files@v46
        with:
          files: knowledge_base/**
          escape_json: false
          json: true

      - name: Ingest knowledge files
        if: steps.changed-files.outputs.any_changed == 'true'
        env:
          MEMORY_API_URL: ${{ secrets.MEMORY_AGENT_API_URL }}
          CHANGED_FILES: ${{ steps.changed-files.outputs.all_changed_files }}
        run: |
          if [ -z "$MEMORY_API_URL" ]; then
            echo "::warning::MEMORY_AGENT_API_URL secret is not set. Running in dry-run mode."
            DRY_RUN_FLAG="--dry-run"
          else
            DRY_RUN_FLAG=""
          fi

          python3 -c "
          import json
          import os
          import subprocess
          import sys

          files = json.loads(os.environ['CHANGED_FILES'])
          api_url = os.environ.get('MEMORY_API_URL', '')
          dry_run = '$DRY_RUN_FLAG'

          for file_path in files:
              print('---------------------------------------------------')
              print(f'🚀 Processing: {file_path}')

              if not os.path.exists(file_path):
                  print(f'⚠️ File {file_path} was deleted or does not exist.')
                  continue

              cmd = ['python', 'scripts/ingest_knowledge.py', file_path]
              if api_url:
                  cmd.extend(['--url', api_url])
              if dry_run:
                  cmd.append(dry_run)

              try:
                  subprocess.run(cmd, check=True)
              except subprocess.CalledProcessError:
                  print(f'❌ Failed to ingest {file_path}')
                  sys.exit(1)
          "

      - name: No changes summary
        if: steps.changed-files.outputs.any_changed != 'true'
        run: echo "ℹ️ No changes detected under knowledge_base/."
