name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-dev.txt
      - uses: ./.github/actions/setup
      - name: Install lint dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
      - name: Ruff lint
        run: ruff check .
      - name: Ruff format check
        run: ruff format --check .

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt
      - uses: ./.github/actions/setup
      - name: Install contract dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Validate contracts and provider parity
        run: |
          python scripts/fitness/check_gateway_provider_contracts.py
          python -m pytest -q tests/contracts/test_gateway_provider_contracts.py

  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt
      - uses: ./.github/actions/setup
      - name: Install guardrail dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run architectural guardrails
        run: |
          python scripts/ci_guardrails.py
          python scripts/fitness/check_no_app_imports_in_microservices.py --strict
          python scripts/fitness/check_routes_registry_parity.py
          python scripts/fitness/check_tracing_gate.py

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-ci-pipeline-secure-length
      ENVIRONMENT: testing
      LLM_MOCK_MODE: "1"
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
      RECOVERY_ADMIN_PASSWORD: dummy-pass-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt
      - uses: ./.github/actions/setup
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt
      - name: Run tests
        run: |
          python -m pytest -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --durations=10 --tb=short
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    needs: [lint, contracts, guardrails, test]
    if: always() && !cancelled()
    steps:
      - name: Evaluate required checks
        run: |
          echo "lint=${{ needs.lint.result }}"
          echo "contracts=${{ needs.contracts.result }}"
          echo "guardrails=${{ needs.guardrails.result }}"
          echo "test=${{ needs.test.result }}"

          if [ "${{ needs.lint.result }}" != "success" ] || \
             [ "${{ needs.contracts.result }}" != "success" ] || \
             [ "${{ needs.guardrails.result }}" != "success" ] || \
             [ "${{ needs.test.result }}" != "success" ]; then
            echo "❌ One or more required checks failed"
            exit 1
          fi

          echo "✅ All required checks passed"
