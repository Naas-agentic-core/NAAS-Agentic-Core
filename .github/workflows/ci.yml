name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  PYTHON_VERSION: "3.12"
  PIP_DISABLE_PIP_VERSION_CHECK: "1"
  PYTHONDONTWRITEBYTECODE: "1"

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-ci-pipeline-secure-length
      ENVIRONMENT: testing
      LLM_MOCK_MODE: "1"
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
      RECOVERY_ADMIN_PASSWORD: dummy-pass-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: ./.github/actions/setup
      - name: Install lint dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "ruff==0.14.9"
          exit 0
      - name: Ruff lint
        shell: bash
        run: |
          set -euo pipefail
          ruff check .
          exit 0
      - name: Ruff format check
        shell: bash
        run: |
          set -euo pipefail
          ruff format --check .
          exit 0

  contracts:
    name: contracts
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-ci-pipeline-secure-length
      ENVIRONMENT: testing
      LLM_MOCK_MODE: "1"
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
      RECOVERY_ADMIN_PASSWORD: dummy-pass-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - uses: ./.github/actions/setup
      - name: Install contract dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install "pytest==7.4.4"
          exit 0
      - name: Validate contracts and provider parity
        shell: bash
        run: |
          set -euo pipefail
          python scripts/fitness/check_gateway_provider_contracts.py
          python -m pytest -q tests/contracts/test_gateway_provider_contracts.py
          exit 0

  guardrails:
    name: guardrails
    runs-on: ubuntu-latest
    timeout-minutes: 15
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-ci-pipeline-secure-length
      ENVIRONMENT: testing
      LLM_MOCK_MODE: "1"
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
      RECOVERY_ADMIN_PASSWORD: dummy-pass-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - uses: ./.github/actions/setup
      - name: Install guardrail dependencies
        shell: bash
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
          exit 0
      - name: Run architectural guardrails
        shell: bash
        run: |
          set -euo pipefail
          python scripts/ci_guardrails.py
          python scripts/fitness/check_no_app_imports_in_microservices.py --strict
          python scripts/fitness/check_route_registry_parity.py
          python scripts/fitness/check_tracing_gate.py
          exit 0

  test:
    name: test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      DATABASE_URL: "sqlite+aiosqlite:///:memory:"
      SECRET_KEY: test-secret-key-for-ci-pipeline-secure-length
      ENVIRONMENT: testing
      LLM_MOCK_MODE: "1"
      SUPABASE_URL: https://dummy.supabase.co
      SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
      RECOVERY_ADMIN_PASSWORD: dummy-pass-for-ci
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-ci.txt
      - uses: ./.github/actions/setup
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-ci.txt
      - name: Run tests
        shell: bash
        run: |
          set -euo pipefail
          python -m pytest -v --cov=app --cov-report=xml:coverage.xml --cov-report=term-missing --durations=10 --tb=short
          exit 0
      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 7

  required-ci:
    name: required-ci
    runs-on: ubuntu-latest
    needs: [lint, contracts, guardrails, test]
    if: always() && !cancelled()
    steps:
      - name: Evaluate required checks
        shell: bash
        run: |
          set -euo pipefail
          echo "lint=${{ needs.lint.result }}"
          echo "contracts=${{ needs.contracts.result }}"
          echo "guardrails=${{ needs.guardrails.result }}"
          echo "test=${{ needs.test.result }}"

          # Allow skipped as a valid success state alongside success
          isValid() {
            [ "$1" = "success" ] || [ "$1" = "skipped" ]
          }

          if ! isValid "${{ needs.lint.result }}" || \
             ! isValid "${{ needs.contracts.result }}" || \
             ! isValid "${{ needs.guardrails.result }}" || \
             ! isValid "${{ needs.test.result }}"; then
            echo "❌ One or more required checks failed"
            exit 1
          fi

          echo "✅ All required checks passed"
          exit 0
