name: 🔍 Structure Validation (Critical)

on:
  pull_request:
    branches: [main, develop]
    paths:
      - 'app/**'
      - 'tests/**'
      - 'scripts/validate_structure.py'
      - 'requirements-test.txt'
      - '.github/workflows/structure-validation.yml'
  push:
    branches: [main, develop, 'copilot/**']
    paths:
      - 'app/**'
      - 'tests/**'
      - 'scripts/validate_structure.py'
      - 'requirements-test.txt'
      - '.github/workflows/structure-validation.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: structure-validation-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.12'

jobs:
  validate-structure:
    name: Validate Service Structure
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install minimal tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run structure validation
        run: python scripts/validate_structure.py

  validate-integration:
    name: Integration Tests (E2E Chat)
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: validate-structure

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_pass
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: requirements-test.txt

      - name: Install integration test dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: Run integration tests (best effort)
        env:
          DATABASE_URL: postgresql://test_user:test_pass@localhost:5432/test_db
          SECRET_KEY: test-secret-key-for-ci
          ENVIRONMENT: testing
          LLM_MOCK_MODE: '1'
          SUPABASE_URL: https://dummy.supabase.co
          SUPABASE_SERVICE_ROLE_KEY: dummy-key-for-ci
        run: |
          if [ -f "tests/integration/test_chat_e2e.py" ]; then
            if python -m pytest tests/integration/test_chat_e2e.py -v --tb=short; then
              echo "INTEGRATION_STATUS=passed" >> "$GITHUB_ENV"
            else
              echo "::warning::E2E integration tests failed but are non-blocking in this workflow."
              echo "INTEGRATION_STATUS=failed" >> "$GITHUB_ENV"
            fi
          else
            echo "ℹ️ tests/integration/test_chat_e2e.py not found, skipping targeted E2E suite."
            echo "INTEGRATION_STATUS=skipped" >> "$GITHUB_ENV"
          fi

      - name: Integration suite summary
        if: always()
        run: |
          echo "### Integration smoke status: ${INTEGRATION_STATUS:-unknown}" >> "$GITHUB_STEP_SUMMARY"
          echo "ℹ️ Integration smoke is best-effort and does not block merge in this workflow." >> "$GITHUB_STEP_SUMMARY"
